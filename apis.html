<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>Árfolyam váltó</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>
<body class="bg-light">



<div class="container mt-5">
    <h2>HUF átváltó</h2>

   
    <label>Összeg forintban:</label>
    <input type="number" id="osszeg" class="form-control">

    <br>

   
    <label>Válassz devizát:</label><br>
    <input type="radio" name="deviza" value="EUR"> EUR<br>
    <input type="radio" name="deviza" value="USD"> USD<br>
    <input type="radio" name="deviza" value="GBP"> GBP<br>

    <br>

   
    <button class="btn btn-primary" id="valtGomb">Váltás</button>

    <br><br>

   
    <p id="eredmeny"></p>
</div>


<script src="apis.js"></script>
</body>
</html>
